[[test]]
spec_ref = "6.0.1"
title = "Status-based SLA without updated_at triggers warning"
operation = "evaluate_sla"

[test.files]
"tasks/security-fix.md" = """---
status: done
summary: Fixed security issue
---
"""
"sla.toml" = """[[rule]]
id = "security-30d"
name = "Security fixes in 30 days"
query = 'summary ~ "security"'
target = "30d"
start = "status:todo"
stop = "status:done"
severity = "high"
"""

[test.inputs]
task_path = "security-fix"
time = "2026-02-01T00:00:00Z"

[[test.warnings]]
code = "SLA_STATUS_MISSING_UPDATED_AT"
message_contains = "updated_at"
